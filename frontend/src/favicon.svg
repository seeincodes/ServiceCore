<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="256" cy="268" r="170" fill="none" stroke="white" stroke-width="20"/>
  <!-- Clock center -->
  <circle cx="256" cy="268" r="12" fill="white"/>
  <!-- Hour hand (pointing to 10) -->
  <line x1="256" y1="268" x2="200" y2="180" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 2) -->
  <line x1="256" y1="268" x2="340" y2="195" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Hour markers -->
  <circle cx="256" cy="118" r="8" fill="white"/>
  <circle cx="386" cy="268" r="8" fill="white"/>
  <circle cx="256" cy="418" r="8" fill="white"/>
  <circle cx="126" cy="268" r="8" fill="white"/>
  <!-- TK text -->
  <text x="256" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="56" fill="white" letter-spacing="4">TK</text>
</svg>
