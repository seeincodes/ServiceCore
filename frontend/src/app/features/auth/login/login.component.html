<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>TimeKeeper</h1>
      <p>Waste Services Time Tracking</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          [placeholder]="showDemoLogins ? 'driver1@greenwaste.com' : 'email@company.com'"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="login-btn" [disabled]="loading || !email || !password">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

      <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
    </form>

    <div class="demo-accounts" *ngIf="showDemoLogins">
      <p>Demo accounts (password: <strong>password123</strong>)</p>
      <div class="demo-list">
        <button
          class="demo-btn"
          (click)="email = 'driver1@greenwaste.com'; password = 'password123'"
        >
          Driver
        </button>
        <button
          class="demo-btn"
          (click)="email = 'manager@greenwaste.com'; password = 'password123'"
        >
          Manager
        </button>
        <button class="demo-btn" (click)="email = 'admin@greenwaste.com'; password = 'password123'">
          Admin
        </button>
      </div>
    </div>
  </div>
</div>
