<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>{{ 'login.title' | translate }}</h1>
      <p>{{ 'login.subtitle' | translate }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">{{ 'login.email' | translate }}</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          [placeholder]="showDemoLogins ? 'driver1@greenwaste.com' : 'email@company.com'"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'login.password' | translate }}</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="login-btn" [disabled]="loading || !email || !password">
        {{ loading ? ('login.signingIn' | translate) : ('login.signIn' | translate) }}
      </button>

      <a routerLink="/forgot-password" class="forgot-link">{{
        'login.forgotPassword' | translate
      }}</a>
    </form>

    <div class="demo-accounts" *ngIf="showDemoLogins">
      <p>{{ 'login.demoAccounts' | translate }}</p>
      <div class="demo-list">
        <button
          class="demo-btn"
          (click)="email = 'driver1@greenwaste.com'; password = demoPassword"
        >
          {{ 'login.driver' | translate }}
        </button>
        <button
          class="demo-btn"
          (click)="email = 'manager@greenwaste.com'; password = demoPassword"
        >
          {{ 'login.manager' | translate }}
        </button>
        <button class="demo-btn" (click)="email = 'admin@greenwaste.com'; password = demoPassword">
          {{ 'login.admin' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
