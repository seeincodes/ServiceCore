<div class="notifications-page">
  <div class="page-header">
    <h2>Notifications</h2>
    <span class="unread-badge" *ngIf="unreadCount > 0">{{ unreadCount }} unread</span>
    <button class="mark-all-btn" (click)="markAllRead()" *ngIf="unreadCount > 0">
      Mark all read
    </button>
  </div>

  <div class="loading" *ngIf="loading">Loading...</div>

  <div class="empty" *ngIf="!loading && notifications.length === 0">No notifications.</div>

  <div class="notif-list" *ngIf="!loading && notifications.length > 0">
    <div
      *ngFor="let n of notifications"
      class="notif-card"
      [class.unread]="!n.read"
      [class.read]="n.read"
    >
      <div class="notif-icon" [ngClass]="typeClass(n.type)">{{ typeIcon(n.type) }}</div>
      <div class="notif-content">
        <div class="notif-title">{{ n.title }}</div>
        <div class="notif-message">{{ n.message }}</div>
        <div class="notif-time">{{ formatTimestamp(n.createdAt) }}</div>
      </div>
      <button class="mark-read-btn" *ngIf="!n.read" (click)="markAsRead(n)">Mark read</button>
    </div>
  </div>
</div>
