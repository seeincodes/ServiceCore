<div class="admin-settings">
  <h1>{{ 'admin.settings.title' | translate }}</h1>
  <p class="org-name">{{ orgName }}</p>

  <div
    class="message"
    *ngIf="message"
    [class.success]="message.type === 'success'"
    [class.error]="message.type === 'error'"
  >
    {{ message.text }}
  </div>

  <form (ngSubmit)="save()">
    <!-- Branding -->
    <div class="card">
      <h2>{{ 'admin.settings.branding' | translate }}</h2>
      <div class="form-field">
        <label>{{ 'admin.settings.primaryColor' | translate }}</label>
        <div class="color-row">
          <input type="color" [(ngModel)]="branding.primaryColor" name="primaryColor" />
          <input type="text" [(ngModel)]="branding.primaryColor" name="primaryColorText" />
        </div>
      </div>
      <div class="form-field">
        <label>{{ 'admin.settings.secondaryColor' | translate }}</label>
        <div class="color-row">
          <input type="color" [(ngModel)]="branding.secondaryColor" name="secondaryColor" />
          <input type="text" [(ngModel)]="branding.secondaryColor" name="secondaryColorText" />
        </div>
      </div>
      <div class="form-field">
        <label>{{ 'admin.settings.logoUrl' | translate }}</label>
        <input type="text" [(ngModel)]="branding.logo" name="logo" placeholder="/assets/logo.png" />
      </div>
    </div>

    <!-- Overtime Rules -->
    <div class="card">
      <h2>{{ 'admin.settings.otRules' | translate }}</h2>
      <div class="form-field">
        <label>{{ 'admin.settings.otCalculation' | translate }}</label>
        <select [(ngModel)]="config.ot_rules" name="otRules">
          <option value="federal">{{ 'admin.settings.federal' | translate }}</option>
          <option value="california">{{ 'admin.settings.california' | translate }}</option>
        </select>
      </div>
    </div>

    <!-- Feature Toggles -->
    <div class="card">
      <h2>{{ 'admin.settings.features' | translate }}</h2>
      <div class="toggle-list">
        <label class="toggle">
          <input type="checkbox" [(ngModel)]="config.approval_required" name="approvalRequired" />
          <span>{{ 'admin.settings.requireApproval' | translate }}</span>
        </label>
        <label class="toggle">
          <input type="checkbox" [(ngModel)]="config.sms_enabled" name="smsEnabled" />
          <span>{{ 'admin.settings.smsClockIn' | translate }}</span>
        </label>
        <label class="toggle">
          <input type="checkbox" [(ngModel)]="config.qb_enabled" name="qbEnabled" />
          <span>{{ 'admin.settings.qbSync' | translate }}</span>
        </label>
      </div>
    </div>

    <button type="submit" class="save-btn" [disabled]="saving">
      {{
        saving ? ('admin.settings.saving' | translate) : ('admin.settings.saveSettings' | translate)
      }}
    </button>
  </form>
</div>
