<div class="my-route">
  <!-- Smart clock-in reminder -->
  <div class="reminder" *ngIf="clockInReminder">
    <div class="reminder-text">{{ clockInReminder.message }}</div>
    <div class="reminder-actions">
      <button class="remind-btn confirm" (click)="confirmClockIn()">Clock In Now</button>
      <button class="remind-btn dismiss" (click)="dismissReminder()">Dismiss</button>
    </div>
  </div>

  <h1>{{ routeName }}</h1>

  <div class="loading" *ngIf="loading">Loading route...</div>

  <div *ngIf="!loading">
    <!-- Route summary -->
    <div class="route-summary" *ngIf="totalDistance > 0">
      <div class="summary-item">
        <span class="summary-value">{{ stops.length }}</span>
        <span class="summary-label">Stops</span>
      </div>
      <div class="summary-item">
        <span class="summary-value">{{ totalDistance }} km</span>
        <span class="summary-label">Distance</span>
      </div>
      <div class="summary-item">
        <span class="summary-value">{{ totalDuration }} min</span>
        <span class="summary-label">Est. Time</span>
      </div>
    </div>

    <!-- Map -->
    <app-map #routeMap [markers]="markers" height="350px"></app-map>

    <!-- Stop list -->
    <div class="stop-list">
      <div *ngFor="let stop of stops; let i = index" class="stop-item" (click)="focusStop(i)">
        <span class="stop-number">{{ i + 1 }}</span>
        <span class="stop-name">{{ stop.name }}</span>
        <a class="navigate-btn" (click)="navigateTo(stop, $event)" title="Open in Maps">Navigate</a>
      </div>
    </div>

    <!-- Turn-by-turn directions -->
    <button class="directions-toggle" (click)="toggleDirections()" *ngIf="steps.length > 0">
      {{ showDirections ? 'Hide Directions' : 'Show Directions' }} ({{ steps.length }} steps)
    </button>

    <div class="directions" *ngIf="showDirections && steps.length > 0">
      <div *ngFor="let step of steps; let i = index" class="direction-step">
        <span class="step-num">{{ i + 1 }}</span>
        <span class="step-text">{{ step.instruction }}</span>
        <span class="step-dist">{{ step.distanceKm }} km</span>
      </div>
    </div>

    <div class="no-route" *ngIf="stops.length < 2">No route assigned today.</div>
  </div>
</div>
