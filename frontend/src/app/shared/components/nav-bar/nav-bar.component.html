<nav class="nav-bar" *ngIf="isAuthenticated">
  <div class="nav-content">
    <div class="nav-brand">
      <span class="brand-name">TimeKeeper</span>
    </div>

    <!-- Desktop links -->
    <div class="nav-links desktop-only">
      <a
        *ngFor="let link of links"
        [routerLink]="link.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: link.path === '/manager' }"
        class="nav-link"
      >
        <span class="nav-icon">{{ link.icon }}</span>
        {{ link.label }}
      </a>
    </div>

    <div class="nav-right desktop-only">
      <div class="lang-switcher">
        <button
          *ngFor="let lang of languages"
          class="lang-btn"
          [class.active]="currentLang === lang.code"
          (click)="switchLanguage(lang.code)"
        >
          {{ lang.label }}
        </button>
      </div>
      <a routerLink="/profile" class="user-info-link">{{ user?.firstName }} {{ user?.lastName }}</a>
      <button class="logout-btn" (click)="logout()">{{ 'nav.logout' | translate }}</button>
    </div>

    <!-- Mobile hamburger -->
    <button class="hamburger mobile-only" (click)="toggleMenu()" [class.open]="menuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" *ngIf="menuOpen">
    <a routerLink="/profile" class="mobile-user" (click)="closeMenu()"
      >{{ user?.firstName }} {{ user?.lastName }}</a
    >
    <a
      *ngFor="let link of links"
      [routerLink]="link.path"
      routerLinkActive="active"
      class="mobile-link"
      (click)="closeMenu()"
    >
      <span class="nav-icon">{{ link.icon }}</span>
      {{ link.label }}
    </a>
    <div class="mobile-lang">
      <button
        *ngFor="let lang of languages"
        class="lang-btn"
        [class.active]="currentLang === lang.code"
        (click)="switchLanguage(lang.code)"
      >
        {{ lang.label }}
      </button>
    </div>
    <button class="mobile-link mobile-logout" (click)="logout()">
      {{ 'nav.logout' | translate }}
    </button>
  </div>
</nav>
