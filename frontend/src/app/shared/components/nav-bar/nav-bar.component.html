<nav class="nav-bar" *ngIf="isAuthenticated">
  <div class="nav-content">
    <div class="nav-brand">
      <span class="brand-name">TimeKeeper</span>
    </div>

    <!-- Desktop links -->
    <div class="nav-links desktop-only">
      <a
        *ngFor="let link of links"
        [routerLink]="link.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: link.path === '/manager' }"
        class="nav-link"
      >
        <span class="nav-icon" [innerHTML]="link.icon"></span>
        {{ link.label | translate }}
      </a>
    </div>

    <div class="nav-right desktop-only">
      <a routerLink="/manager/review" class="alert-bell" *ngIf="isManagerOrAdmin && alertCount > 0">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
        </svg>
        <span class="alert-badge">{{ alertCount }}</span>
      </a>
      <select class="lang-select" [ngModel]="currentLang" (ngModelChange)="switchLanguage($event)">
        <option *ngFor="let lang of languages" [value]="lang.code">{{ lang.label }}</option>
      </select>
      <a routerLink="/profile" class="user-info-link">{{ user?.firstName }} {{ user?.lastName }}</a>
      <button class="logout-btn" (click)="logout()">{{ 'nav.logout' | translate }}</button>
    </div>

    <!-- Mobile hamburger -->
    <button class="hamburger mobile-only" (click)="toggleMenu()" [class.open]="menuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" *ngIf="menuOpen">
    <a routerLink="/profile" class="mobile-user" (click)="closeMenu()"
      >{{ user?.firstName }} {{ user?.lastName }}</a
    >
    <a
      *ngFor="let link of links"
      [routerLink]="link.path"
      routerLinkActive="active"
      class="mobile-link"
      (click)="closeMenu()"
    >
      <span class="nav-icon" [innerHTML]="link.icon"></span>
      {{ link.label | translate }}
    </a>
    <a
      routerLink="/manager/review"
      class="mobile-link alert-link"
      (click)="closeMenu()"
      *ngIf="isManagerOrAdmin && alertCount > 0"
    >
      <span class="nav-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
        </svg>
      </span>
      {{ 'nav.review' | translate }} ({{ alertCount }})
    </a>
    <div class="mobile-lang">
      <select class="lang-select" [ngModel]="currentLang" (ngModelChange)="switchLanguage($event)">
        <option *ngFor="let lang of languages" [value]="lang.code">{{ lang.label }}</option>
      </select>
    </div>
    <button class="mobile-link mobile-logout" (click)="logout()">
      {{ 'nav.logout' | translate }}
    </button>
  </div>
</nav>
